name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: Attach the built binary to the release for the current version
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # Required for PyPI trusted publishing (OIDC) - no API token is stored.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  # Built inside AlmaLinux 8 so the bundled binary links against glibc 2.28,
  # making it runnable on RHEL8-era hosts whose system Python is too old for
  # the package itself.
  binary:
    runs-on: ubuntu-latest
    container: almalinux:8
    steps:
      - name: Install build prerequisites
        run: dnf install -y python3.12 python3.12-pip git-core binutils
      - uses: actions/checkout@v4
      - name: Install package and PyInstaller
        run: |
          python3.12 -m pip install --upgrade pip
          python3.12 -m pip install . pyinstaller
      - name: Build single-file binary
        run: |
          python3.12 -m PyInstaller --onefile --name janitor \
            --collect-all openstack --collect-all keystoneauth1 \
            --collect-all os_service_types \
            --copy-metadata openstack-janitor --copy-metadata openstacksdk \
            --copy-metadata keystoneauth1 \
            scripts/pyinstaller-entry.py
      - name: Smoke test
        run: |
          ./dist/janitor --help
          ./dist/janitor audit --help
          set +e
          ./dist/janitor audit --cloud nonexistent-cloud
          code=$?
          set -e
          echo "audit against missing cloud exited $code (want 3)"
          test "$code" -eq 3
      - name: Rename artifact
        run: mv dist/janitor dist/janitor-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: janitor-linux-x86_64
          path: dist/janitor-linux-x86_64

  attach:
    if: github.ref_type == 'tag' || inputs.publish
    needs: binary
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: janitor-linux-x86_64
          path: dist/
      - name: Attach binary to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            tag="$GITHUB_REF_NAME"
          else
            version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
            tag="v$version"
          fi
          gh release upload "$tag" dist/janitor-linux-x86_64 --clobber
